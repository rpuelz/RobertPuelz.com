name: Fetch Substack Posts

on:
  schedule:
    # Runs every 6 hours — picks up new posts within half a day of publishing
    - cron: '0 */6 * * *'
  workflow_dispatch:  # Lets you trigger it manually from GitHub Actions tab

jobs:
  fetch-posts:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # Needed to commit posts.json back to the repo

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Fetch Substack RSS and write posts.json
        run: |
          python3 - <<'EOF'
          import urllib.request
          import json
          import re
          import html
          from datetime import datetime, timezone

          # Substack's public API — not blocked like the RSS feed
          API_URL  = "https://robertpuelz.substack.com/api/v1/posts?limit=5&offset=0"
          OUT_FILE = "posts.json"

          # ── Fetch ────────────────────────────────────────────────────────
          req = urllib.request.Request(
              API_URL,
              headers={
                  "User-Agent": "Mozilla/5.0 (compatible; Googlebot/2.1; +http://www.google.com/bot.html)",
                  "Accept": "application/json",
              }
          )
          with urllib.request.urlopen(req, timeout=15) as resp:
              data = json.loads(resp.read())

          # ── Helpers ──────────────────────────────────────────────────────
          def strip_tags(text):
              return re.sub(r"<[^>]+>", "", text or "")

          def clean(text):
              return re.sub(r"\s+", " ", html.unescape(strip_tags(text))).strip()

          def truncate(text, max_chars=180):
              if len(text) <= max_chars:
                  return text
              cut = text.rfind(" ", 0, max_chars)
              return text[:cut] + "\u2026"

          def read_time(word_count):
              mins = max(1, round(word_count / 200))
              return f"{mins} min read"

          def friendly_date(iso):
              try:
                  d = datetime.fromisoformat(iso.replace("Z", "+00:00"))
                  return d.strftime("%b %-d, %Y")
              except Exception:
                  return iso[:10]

          # ── Parse posts ──────────────────────────────────────────────────
          posts = []
          for item in data:
              title      = clean(item.get("title", ""))
              slug       = item.get("slug", "")
              url        = f"https://robertpuelz.substack.com/p/{slug}"
              pub_iso    = item.get("post_date", "")
              pub_label  = friendly_date(pub_iso)
              subtitle   = clean(item.get("subtitle", ""))
              word_count = item.get("wordcount", 0) or 0
              excerpt    = truncate(subtitle, 180) if subtitle else ""
              rt         = read_time(word_count)

              posts.append({
                  "title":    title,
                  "url":      url,
                  "tag":      "ESSAY",
                  "excerpt":  excerpt,
                  "readTime": rt,
                  "date":     pub_label,
                  "pubIso":   pub_iso,
              })

          # ── Write output ─────────────────────────────────────────────────
          with open(OUT_FILE, "w", encoding="utf-8") as f:
              json.dump({"updated": datetime.now(timezone.utc).isoformat(),
                         "posts":   posts}, f, ensure_ascii=False, indent=2)

          print(f"Wrote {len(posts)} posts to {OUT_FILE}")
          EOF

      - name: Commit posts.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts.json
          # Only commit when the file actually changed
          if git diff --cached --quiet; then
            echo "No changes to posts.json — skipping commit."
          else
            git commit -m "chore: refresh Substack posts [skip ci]"
            git push
          fi
