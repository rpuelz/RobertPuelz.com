name: Fetch Substack Posts

on:
  schedule:
    # Runs every 6 hours — picks up new posts within half a day of publishing
    - cron: '0 */6 * * *'
  workflow_dispatch:  # Lets you trigger it manually from GitHub Actions tab

jobs:
  fetch-posts:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # Needed to commit posts.json back to the repo

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Fetch Substack RSS and write posts.json
        run: |
          # Use curl with browser headers — more likely to get through than urllib
          curl -s -L \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            -H "Accept: application/json" \
            -H "Accept-Language: en-US,en;q=0.9" \
            -H "Referer: https://robertpuelz.substack.com/" \
            "https://robertpuelz.substack.com/api/v1/posts?limit=5&offset=0" \
            -o raw_posts.json

          python3 - <<'EOF'
          import json
          import re
          import html
          from datetime import datetime, timezone

          OUT_FILE = "posts.json"

          with open("raw_posts.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          def strip_tags(text):
              return re.sub(r"<[^>]+>", "", text or "")

          def clean(text):
              return re.sub(r"\s+", " ", html.unescape(strip_tags(text))).strip()

          def truncate(text, max_chars=180):
              if len(text) <= max_chars:
                  return text
              cut = text.rfind(" ", 0, max_chars)
              return text[:cut] + "\u2026"

          def friendly_date(iso):
              try:
                  d = datetime.fromisoformat(iso.replace("Z", "+00:00"))
                  return d.strftime("%b %-d, %Y")
              except Exception:
                  return iso[:10]

          posts = []
          for item in data:
              title     = clean(item.get("title", ""))
              slug      = item.get("slug", "")
              url       = f"https://robertpuelz.substack.com/p/{slug}"
              pub_iso   = item.get("post_date", "")
              subtitle  = clean(item.get("subtitle", ""))
              excerpt   = truncate(subtitle, 180) if subtitle else ""
              words     = item.get("wordcount", 0) or 0
              rt        = f"{max(1, round(words / 200))} min read"

              posts.append({
                  "title":    title,
                  "url":      url,
                  "tag":      "ESSAY",
                  "excerpt":  excerpt,
                  "readTime": rt,
                  "date":     friendly_date(pub_iso),
                  "pubIso":   pub_iso,
              })

          with open(OUT_FILE, "w", encoding="utf-8") as f:
              json.dump({"updated": datetime.now(timezone.utc).isoformat(),
                         "posts": posts}, f, ensure_ascii=False, indent=2)

          print(f"Wrote {len(posts)} posts to {OUT_FILE}")
          EOF

      - name: Commit posts.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts.json
          # Only commit when the file actually changed
          if git diff --cached --quiet; then
            echo "No changes to posts.json — skipping commit."
          else
            git commit -m "chore: refresh Substack posts [skip ci]"
            git push
          fi
